name: Android CI with Tests & Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests + Generate JaCoCo Report
        run: ./gradlew testDebugUnitTest jacocoTestReport --stacktrace

      - name: Upload JaCoCo Coverage Report
        if: always()                     # Upload even if some tests fail
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: |
            app/build/reports/jacoco/testDebugUnitTestReport/html/
            app/build/reports/jacoco/*/html/
            **/build/reports/jacoco/**/html/
          retention-days: 14
          if-no-files-found: warn
