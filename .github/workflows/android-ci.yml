name: Android CI with Tests & Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-coverage:
    name: Run Unit Tests & JaCoCo Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests + Generate JaCoCo Report
        run: ./gradlew testDebugUnitTest jacocoTestReport --stacktrace

      - name: Upload Test Report (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: app/build/reports/jacoco/testDebugUnitTestReport/html/
          retention-days: 7

      - name: Upload JaCoCo Execution Data (for advanced tools)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-exec
          path: app/build/jacoco/testDebugUnitTest.exec
